<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Visual — Pixel World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- HUD Top Bar -->
  <div id="hud-top">
    <div class="hud-left">
      <span class="logo-text">👾 CLAUDE WORLD</span>
      <span id="active-count" class="hud-badge">0 ACTIVE</span>
      <span id="hud-waiting" class="hud-badge hud-waiting" style="display:none">⚠ 0 waiting</span>
      <span id="hud-tools" class="hud-badge" style="border-color:var(--magenta);color:var(--magenta);display:none">0 tools</span>
    </div>
    <div class="hud-right">
      <button id="hud-stats-btn" class="hud-icon-btn" title="Statistics">📊</button>
      <button id="hud-mute-btn" class="hud-icon-btn" title="Toggle sound">🔊</button>
      <button id="hud-settings-btn" class="hud-icon-btn" title="Notification settings">🔔</button>
      <button id="hud-diag-btn" class="hud-icon-btn" title="Diagnostics">⚙</button>
      <span id="hud-time" class="hud-time"></span>
    </div>
  </div>

  <!-- Layout: left panel + canvas -->
  <div id="layout">
    <!-- Left Session List -->
    <div id="session-sidebar">
      <div class="sidebar-header">
        <span>SESSIONS</span>
        <span id="sidebar-count" class="sidebar-count">0</span>
        <button id="sidebar-toggle" class="sidebar-toggle" title="Collapse">◀</button>
      </div>
      <div id="sidebar-filters">
        <div class="filter-row" id="status-filters"></div>
        <div class="filter-row" id="source-filters">
          <button id="group-toggle" class="filter-btn" title="Toggle group by project">GRP</button>
        </div>
        <input type="text" id="filter-search" class="filter-search" placeholder="Search...">
      </div>
      <div id="session-list"></div>
    </div>

    <!-- Game Canvas -->
    <canvas id="game-canvas"></canvas>
  </div>

  <!-- Right Detail Panel (shown when character is selected) -->
  <div id="side-panel" class="side-panel hidden">
    <button id="close-panel" class="px-btn close-btn">✕</button>
    <div id="panel-avatar"></div>
    <div id="panel-session" class="panel-field"></div>
    <div id="panel-project" class="panel-field muted"></div>
    <div id="panel-actions" class="panel-actions"></div>
    <div class="panel-divider"></div>
    <div class="panel-section-title">CURRENT TOOL</div>
    <div id="panel-tool" class="panel-tool-box"></div>
    <div class="panel-divider"></div>
    <div class="panel-section-title">LAST REPLY</div>
    <div id="panel-reply" class="panel-reply"></div>
    <div id="panel-errors-title" class="panel-section-title" style="display:none">ERRORS</div>
    <div id="panel-errors" class="panel-errors"></div>
    <div class="panel-divider"></div>
    <div class="panel-section-title">SLOWEST CALLS</div>
    <div id="panel-slowest" class="panel-history"></div>
    <div class="panel-divider"></div>
    <div class="panel-section-title">RECENT CALLS</div>
    <div id="panel-history" class="panel-history"></div>
  </div>

  <!-- Diagnostic Panel -->
  <div id="diag-panel" class="diag-panel hidden">
    <div class="diag-header">
      <span>DIAGNOSTICS</span>
      <button id="diag-close" class="px-btn close-btn">✕</button>
    </div>
    <div id="diag-body" class="diag-body"></div>
  </div>

  <!-- Stats Panel -->
  <div id="stats-panel" class="diag-panel hidden" style="width:360px">
    <div class="diag-header">
      <span>STATISTICS</span>
      <button id="stats-close" class="px-btn close-btn">✕</button>
    </div>
    <div id="stats-body" class="diag-body"></div>
  </div>

  <!-- Settings Panel -->
  <div id="settings-panel" class="diag-panel hidden">
    <div class="diag-header">
      <span>NOTIFICATIONS</span>
      <button id="settings-close" class="px-btn close-btn">✕</button>
    </div>
    <div class="diag-body">
      <div class="settings-row">
        <label class="settings-label">Enabled</label>
        <input type="checkbox" id="set-enabled" class="settings-check">
      </div>
      <div class="settings-row">
        <label class="settings-label">Delay (min)</label>
        <input type="number" id="set-delay" class="settings-input" min="0" max="60" value="0">
      </div>
      <div class="settings-row">
        <label class="settings-label">Projects</label>
        <input type="text" id="set-projects" class="filter-search" placeholder="keyword1, keyword2...">
      </div>
      <div style="font-size:6px;color:#666;margin-top:2px">Comma-separated. Empty = all projects.</div>
    </div>
  </div>

  <!-- SSE status overlay -->
  <div id="sse-status" class="sse-status hidden"></div>

  <!-- Legend bottom left -->
  <div id="legend">
    <div class="legend-title">TOOLS</div>
    <div class="legend-items" id="legend-items"></div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-area"></div>

  <script type="module" src="/dist/game.js"></script>
</body>
</html>
